# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: tuirec

before:
  hooks:
    - go mod tidy
    - go run ./internal/release/downloadagg

builds:
  - id: tuirec
    main: ./cmd/tuirec
    binary: tuirec
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - agent/RECORDING-AGENT.md
      - agent/record-app.ps1
      - src: "build/agg/{{ .Os }}_{{ .Arch }}/agg*"
        dst: .
        strip_parent: true
        info:
          mode: 0755

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: gui-cs
    name: tuirec
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
