# TUIcast POC – UICatalog Recording
#
# Self-contained workflow that:
#   1. Builds UICatalog from the Terminal.Gui repository.
#   2. Records a short session via TUIcast's standalone recorder CLI.
#   3. Verifies that a valid animated GIF was produced.
#   4. Uploads the GIF (and raw cast file) as workflow artifacts.
#
# No Azure or Anthropic credentials are required.  The recorder uses a
# deterministic keystroke script instead of the AI navigation loop.
#
# Trigger:
#   - Manually via the GitHub UI ("Run workflow")
#   - Automatically on push to this branch

name: TUIcast POC – UICatalog GIF

on:
  workflow_dispatch:
  push:
    branches:
      - copilot/add-tui-gif-generation-feature

jobs:
  record-uicatalog:
    name: Record UICatalog and produce GIF
    runs-on: ubuntu-latest
    # Minimal GITHUB_TOKEN permissions – this job only reads the repository
    # and uploads artifacts; no write access is required.
    permissions:
      contents: read

    steps:
      # ── Checkout TUIcast ────────────────────────────────────────────────────
      - name: Checkout TUIcast
        uses: actions/checkout@v4

      # ── .NET 10 setup ───────────────────────────────────────────────────────
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # ── Build UICatalog ─────────────────────────────────────────────────────
      # UICatalog is the official Terminal.Gui demo application.
      # The v2_develop branch targets net10.0 (see Directory.Build.props).
      - name: Clone Terminal.Gui
        run: |
          git clone --depth 1 --branch v2_develop \
            https://github.com/gui-cs/Terminal.Gui \
            /tmp/terminal-gui

      - name: Publish UICatalog
        run: |
          dotnet publish /tmp/terminal-gui/Examples/UICatalog/UICatalog.csproj \
            -c Release \
            -o /tmp/uicatalog \
            --verbosity quiet
          # Ensure the apphost binary is executable.
          chmod +x /tmp/uicatalog/UICatalog
          echo "UICatalog binary: $(ls -lh /tmp/uicatalog/UICatalog)"

      # ── Node.js setup ───────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # node-pty is a native module; ensure the C++ build toolchain is present.
      - name: Install native-module build tools
        run: |
          sudo apt-get install -y --no-install-recommends python3 make g++

      - name: Install npm dependencies
        run: npm ci

      # ── agg (GIF renderer) ──────────────────────────────────────────────────
      # agg is a CLI tool that converts asciinema cast files into animated GIFs.
      # It ships as a static binary so no further installation steps are needed.
      - name: Install agg
        env:
          AGG_VERSION: "1.5.0"
        run: |
          curl -fsSL \
            "https://github.com/asciinema/agg/releases/download/v${AGG_VERSION}/agg-x86_64-unknown-linux-musl" \
            -o /usr/local/bin/agg
          chmod +x /usr/local/bin/agg
          agg --version

      # ── Record UICatalog ────────────────────────────────────────────────────
      # Keystroke sequence:
      #   wait:3000      – pause 3 s so the app fully renders its initial screen
      #                    and Terminal.Gui's SGR mouse reporting is active
      #   click:39:1     – mouse-click "Help" in the menu bar (col 39, row 1)
      #                    Terminal.Gui v2 MenuBar layout with " title " padding:
      #                     " File "(1-6) " Themes "(7-14) " Diagnostics "(15-27)
      #                     " Logging "(28-36) " Help "(37-42)  → mid = col 39
      #   wait:500       – wait for the Help dropdown to open
      #   click:39:3     – click "About..." inside the popup
      #                    (row 2 = top border, row 3 = first item inside border)
      #   wait:2000      – pause so the About dialog is clearly visible in the GIF
      #   Escape         – dismiss the About dialog
      #   wait:500       – settle
      #   Ctrl+Q         – quit UICatalog cleanly (\x11)
      - name: Record UICatalog session
        run: |
          npm run record -- \
            --binary      /tmp/uicatalog/UICatalog \
            --output      /tmp/uicatalog.gif \
            --cast-output /tmp/uicatalog.cast \
            --keystrokes  "wait:3000,click:39:1,wait:500,click:39:3,wait:2000,Escape,wait:500,Ctrl+Q" \
            --cols        132 \
            --rows        40 \
            --theme       monokai \
            --speed       1.0 \
            --line-height 1.0 \
            --max-duration 30 \
            --title       "UICatalog – TUIcast POC"
        env:
          TERM: xterm-256color
          COLORTERM: truecolor
          # agg binary location (already on PATH after the install step above).
          AGG_PATH: /usr/local/bin/agg

      # ── Verify ─────────────────────────────────────────────────────────────
      - name: Verify GIF was produced
        run: |
          if [ ! -f /tmp/uicatalog.gif ]; then
            echo "❌ GIF file not found!" && exit 1
          fi
          SIZE=$(stat -c%s /tmp/uicatalog.gif)
          if [ "$SIZE" -lt 1024 ]; then
            echo "❌ GIF is suspiciously small (${SIZE} bytes)" && exit 1
          fi
          MAGIC=$(head -c 6 /tmp/uicatalog.gif)
          if [[ "$MAGIC" != GIF89a && "$MAGIC" != GIF87a ]]; then
            echo "❌ File does not have a valid GIF header" && exit 1
          fi
          echo "✅ GIF verified: $(du -h /tmp/uicatalog.gif | cut -f1)"

      # ── Upload artifacts ────────────────────────────────────────────────────
      - name: Upload recording artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: uicatalog-recording
          path: |
            /tmp/uicatalog.gif
            /tmp/uicatalog.cast
          if-no-files-found: error

      # ── Job summary ─────────────────────────────────────────────────────────
      # Print a direct link to the artifact so there's no need to hunt through
      # the artifacts panel or unzip anything to reach the GIF.
      - name: Write job summary
        run: |
          echo "## 🎬 UICatalog Recording" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**[⬇ Download GIF + cast (uicatalog-recording.zip)](${{ steps.upload.outputs.artifact-url }})**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| uicatalog.gif  | $(du -h /tmp/uicatalog.gif  | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| uicatalog.cast | $(du -h /tmp/uicatalog.cast | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
