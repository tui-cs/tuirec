name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.22"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  integration:
    name: Integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Install agg
        run: |
          curl -fsSL \
            "https://github.com/asciinema/agg/releases/download/v1.8.1/agg-x86_64-unknown-linux-musl" \
            -o /usr/local/bin/agg
          chmod +x /usr/local/bin/agg
        if: runner.os == 'Linux'

      - name: Install agg (macOS)
        run: |
          curl -fsSL \
            "https://github.com/asciinema/agg/releases/download/v1.8.1/agg-aarch64-apple-darwin" \
            -o /usr/local/bin/agg
          chmod +x /usr/local/bin/agg
        if: runner.os == 'macOS'

      - name: Install agg (Windows)
        run: |
          New-Item -ItemType Directory -Force "$env:RUNNER_TEMP\agg" | Out-Null
          Invoke-WebRequest `
            "https://github.com/asciinema/agg/releases/download/v1.8.1/agg-x86_64-pc-windows-msvc.exe" `
            -OutFile "$env:RUNNER_TEMP\agg\agg.exe"
          Add-Content $env:GITHUB_PATH "$env:RUNNER_TEMP\agg"
        if: runner.os == 'Windows'

      - name: Integration tests
        run: go test -tags integration ./...
